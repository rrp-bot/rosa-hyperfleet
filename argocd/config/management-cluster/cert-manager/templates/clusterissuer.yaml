{{- if .Values.global.dns_zone_operator_role_arn }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01
  annotations:
    # Temporary: defer ClusterIssuer until cert-manager webhook endpoints are ready.
    # Proper fix: adopt ApplicationSet RollingSync strategy for cross-app dependency ordering.
    argocd.argoproj.io/sync-wave: "2"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-key
    solvers:
    - dns01:
        route53:
          region: {{ .Values.global.aws_region }}
          role: {{ .Values.global.dns_zone_operator_role_arn }}
{{- end }}
