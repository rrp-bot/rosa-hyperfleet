# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_type: ""
  environment: ""
  aws_region: ""
  cluster_name: ""

# =====================================================================
# Upstream vector/vector subchart values
# Ref: https://github.com/vectordotdev/helm-charts/blob/develop/charts/vector/values.yaml
#
# Vector pipeline config mirrors RHOBS ClusterLogForwarder patterns:
#   - JSON parsing (CLF parse-json filter)
#   - Webhook log exclusion (CLF input exclusion)
#   - Disk-buffered delivery with retry (CLF output tuning)
# =====================================================================
vector:
  role: Agent

  # Pod-level security context.
  # Vector needs root to read /var/log and /var/lib/docker on host nodes.
  # Matches CLO/Vector behavior on OpenShift where the collector runs privileged.
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault

  # Container-level security context.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: [ALL]
      add: [DAC_READ_SEARCH]

  # Schedule on all nodes (matches RHOBS CLF collector tolerations).
  tolerations:
    - operator: Exists

  # Resource limits match RHOBS CLF collector spec.
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 750m
      memory: 2Gi

  # Agent persists checkpoints on the host node.
  persistence:
    hostPath:
      enabled: true
      path: /var/lib/vector

  # Probes — required when using customConfig since chart doesn't auto-generate them.
  livenessProbe:
    httpGet:
      path: /health
      port: 8686
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: 8686
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2

  # Expose API + metrics ports.
  containerPorts:
    - name: api
      containerPort: 8686
      protocol: TCP
    - name: prom-exporter
      containerPort: 9090
      protocol: TCP

  # PodMonitor for Prometheus scraping (replaces custom ServiceMonitor).
  podMonitor:
    enabled: true
    port: prom-exporter
    path: /metrics
    interval: "30s"

  # RBAC auto-created for Agent role.
  rbac:
    create: true

  serviceAccount:
    create: true
    name: vector

  # ── Vector pipeline configuration ──────────────────────────────────────
  # Replaces chart defaults entirely. Aligned with RHOBS CLF patterns.
  # NOTE: customConfig is processed via Helm tpl within the subchart scope.
  # Only .Values.global.* is accessible (Helm propagates globals to subcharts).
  customConfig:
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: "0.0.0.0:8686"

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${VECTOR_SELF_NODE_NAME}"
        # Exclude webhook containers: high-volume, low-value admission webhook
        # logs that inflate storage cost without aiding debugging. Matches RHOBS
        # ClusterLogForwarder exclusion pattern.
        exclude_paths_glob_patterns:
          - "/var/log/pods/*/webhook*/**"
          - "/var/log/pods/*/webhooks/**"

      internal_metrics:
        type: internal_metrics

    transforms:
      # Parse JSON log lines into structured fields. Improves Loki query
      # performance by enabling label-based filtering on structured data.
      # Mirrors the RHOBS CLF "parse-json" filter.
      parse_json:
        type: remap
        inputs: [kubernetes_logs]
        source: |
          parsed, err = parse_json(.message)
          if err == null && is_object(parsed) {
            . = merge!(., parsed)
          }

      add_cluster_metadata:
        type: remap
        inputs: [parse_json]
        source: |
          .cluster_name = "{{ .Values.global.cluster_name | default "unknown" }}"
          .cluster_type = "regional-cluster"

    sinks:
      loki:
        type: loki
        inputs: [add_cluster_metadata]
        endpoint: "http://loki-distributor.loki.svc:3100"
        encoding:
          codec: json
        labels:
          cluster_name: '{{ "{{ cluster_name }}" }}'
          cluster_type: '{{ "{{ cluster_type }}" }}'
          namespace: '{{ "{{ kubernetes.pod_namespace }}" }}'
          pod: '{{ "{{ kubernetes.pod_name }}" }}'
          container: '{{ "{{ kubernetes.container_name }}" }}'
        out_of_order_action: accept
        remove_timestamp: false
        # Disk buffer prevents log loss during Loki restarts or transient
        # unavailability. 256MB limit per node; blocks when full rather than
        # dropping. Retry up to 5 min with exponential backoff.
        buffer:
          type: disk
          max_size: 268435488
          when_full: block
        batch:
          max_bytes: 2049000
          timeout_secs: 5
        request:
          retry_max_duration_secs: 300
          retry_initial_backoff_secs: 1

      prometheus_exporter:
        type: prometheus_exporter
        inputs: [internal_metrics]
        address: "0.0.0.0:9090"
