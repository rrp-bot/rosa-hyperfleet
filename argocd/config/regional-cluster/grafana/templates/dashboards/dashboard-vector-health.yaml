apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-vector-health
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Logging"
data:
  vector-health.json: {{ .Files.Get "dashboards/logging/vector-health.json" | quote }}
