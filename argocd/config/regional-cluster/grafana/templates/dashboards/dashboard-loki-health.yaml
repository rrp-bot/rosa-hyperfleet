apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-loki-health
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Logging"
data:
  loki-health.json: {{ .Files.Get "dashboards/logging/loki-health.json" | quote }}
